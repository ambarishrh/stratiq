version: "3.9"

services:
  stratiq:
    image: ambarishrh/stratiq:latest
    container_name: stratiq
    ports:
      - "3000:3000"
    volumes:
      - stratiq_data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - STRATIQ_DB=/app/data/stratiq.db

volumes:
  stratiq_data:
    driver: local
